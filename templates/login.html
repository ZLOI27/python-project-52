{% extends "base.html" %}
{% load django_bootstrap5 %}
{% load i18n %}

{% block title %}
    {% translate "Login" %}
{% endblock %}

{% block content %}

<h1 class="my-4">{% translate "Login" %}</h1>

<form method="post">
    {% csrf_token %}
    {% bootstrap_form form %}
    {% bootstrap_button button_type="submit" content=_("Log in") %}
</form>

{% endblock %}
